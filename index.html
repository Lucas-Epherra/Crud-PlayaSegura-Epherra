<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./css/login.css" />
    <link rel="shorcut icon" href="./imgs/favicon.ico" />
    <title>Playa Segura</title>
  </head>

  <body>
    <!-------------------- comienzo del main --------------------->
    <main>
      <div class="loginSite">
        <!-- titulo -->
        <h1 class="titulo">Playas Seguras</h1>

        <!-- login box -->

        <div id="container-login" class="loginBox">
          <h3 class="tituloLogin">Inicio de sesion</h3>

          <!-- formulario de login -->
          <form action="" class="formulario">
            <label for="usuario" class="label">Usuario :</label>

            <input
              type="text"
              name="usuario"
              id="usuario"
              class="inputs"
              placeholder="usuario"
            />

            <label for="contraseña" class="label">Password :</label>

            <input
              type="password"
              name="contraseña"
              id="contraseña"
              class="inputs"
              placeholder="contraseña"
            />

            <input
              type="button"
              value="Iniciar sesión"
              id="btn-login"
              class="btn btn-primary boton"
            />

            <p class="text-center text-light mt-3 mb-2">
              Acceso rápido para visualizar la demo del sistema
            </p>

            <div class="mt-3 d-flex gap-2 justify-content-center flex-wrap">
              <button
                type="button"
                id="btn-demo-manana"
                class="btn btn-outline-light"
              >
                Demo turno mañana
              </button>

              <button
                type="button"
                id="btn-demo-tarde"
                class="btn btn-outline-light"
              >
                Demo turno tarde
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-OERcA2EqjJCMA+/3y+gxIOqMEjwtxJY7qPCqsdltbNJuaOe923+mo//f6V8Qbsw3"
      crossorigin="anonymous"
    ></script>
    <script src="./js/login.js"></script>
  </body>
</html>
