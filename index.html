<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Playa Segura</title>
    <meta
      name="description"
      content="Playa Segura es una aplicación web orientada a la gestión operativa de accesos, turnos y control en entornos de playa."
    />
    <meta name="author" content="Lucas Epherra" />
    <meta name="robots" content="index, follow" />

    <!-- URL canónica -->
    <link rel="canonical" href="https://playa-segura.netlify.app/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="es_ES" />
    <meta property="og:title" content="Playa Segura" />
    <meta
      property="og:description"
      content="Aplicación web para la gestión operativa de accesos, turnos y control en entornos de playa."
    />
    <meta property="og:url" content="https://playa-segura.netlify.app/" />
    <meta property="og:site_name" content="Playa Segura" />
    <meta
      property="og:image"
      content="https://playa-segura.netlify.app/imgs/og-preview.jpg"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Vista previa del proyecto Playa Segura"
    />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Playa Segura" />
    <meta
      name="twitter:description"
      content="Aplicación web para la gestión operativa de accesos, turnos y control en entornos de playa."
    />
    <meta
      name="twitter:image"
      content="https://playa-segura.netlify.app/imgs/og-preview.jpg"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi"
      crossorigin="anonymous"
    />

    <link rel="stylesheet" href="./css/login.css" />
    <link rel="shortcut icon" href="./imgs/favicon.ico" />
  </head>

  <body>
    <header class="hero-header">
      <div class="brand">
        <div class="brand__icon">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M12 2 4 5v6c0 5.2 3.4 9.8 8 11 4.6-1.2 8-5.8 8-11V5l-8-3Zm0 2.2 6 2.2v4.6c0 4.1-2.5 7.9-6 9-3.5-1.1-6-4.9-6-9V6.4l6-2.2Zm0 3.1a3.3 3.3 0 1 0 0 6.6 3.3 3.3 0 0 0 0-6.6Zm-5.3 10c1.2-2 3.2-3.2 5.3-3.2s4.1 1.2 5.3 3.2"
            />
          </svg>
        </div>

        <div class="brand__text">
          <h1 class="titulo">Playa Segura</h1>
        </div>
      </div>
    </header>

    <main>
      <section class="loginSite">
        <div id="container-login" class="loginBox">
          <h2 class="tituloLogin">Iniciar Sesión</h2>
          <p class="subtituloLogin">Acceso al panel operativo</p>

          <form action="" class="formulario">
            <label for="usuario" class="label">Usuario</label>
            <input
              type="text"
              name="usuario"
              id="usuario"
              class="inputs"
              placeholder="Usuario"
              autocomplete="username"
            />

            <label for="contraseña" class="label">Contraseña</label>
            <input
              type="password"
              name="contraseña"
              id="contraseña"
              class="inputs"
              placeholder="Contraseña"
              autocomplete="current-password"
            />

            <input
              type="button"
              value="Entrar al sistema"
              id="btn-login"
              class="btn btn-primary boton"
            />

            <div class="demo-block">
              <p class="demo-text">Ver demo rápida</p>

              <div class="demo-actions">
                <button
                  type="button"
                  id="btn-demo-manana"
                  class="btn btn-outline-light"
                >
                  Turno Mañana
                </button>

                <button
                  type="button"
                  id="btn-demo-tarde"
                  class="btn btn-outline-light"
                >
                  Turno Tarde
                </button>
              </div>
            </div>
          </form>
        </div>
      </section>
    </main>

    <footer class="footer">
      Copyright 2027 - Desarrollado por Lucas Epherra
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-OERcA2EqjJCMA+/3y+gxIOqMEjwtxJY7qPCqsdltbNJuaOe923+mo//f6V8Qbsw3"
      crossorigin="anonymous"
    ></script>
    <script src="./js/login.js"></script>
  </body>
</html>
