<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Playa Segura - Turno Mañana</title>

    <link rel="stylesheet" href="../css/bootstrap.css" />
    <link rel="stylesheet" href="../css/login.css" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="shortcut icon" href="../imgs/favicon.ico" />
  </head>

  <body data-turno="mañana">
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <div class="brand-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M12 2 4 5v6c0 5.2 3.4 9.8 8 11 4.6-1.2 8-5.8 8-11V5l-8-3Zm0 2.2 6 2.2v4.6c0 4.1-2.5 7.9-6 9-3.5-1.1-6-4.9-6-9V6.4l6-2.2Zm0 3.1a3.3 3.3 0 1 0 0 6.6 3.3 3.3 0 0 0 0-6.6Zm-5.3 10c1.2-2 3.2-3.2 5.3-3.2s4.1 1.2 5.3 3.2"
              />
            </svg>
          </div>

          <div>
            <p class="eyebrow">Playa Segura</p>
            <h1 class="page-title">Panel operativo</h1>
          </div>
        </div>

       <div class="topbar-actions">
  <span id="turno-badge" class="turn-badge"></span>

  <button id="btn-cambiar-turno" class="btn switch-turn-btn"></button>

  <button id="btn-volver" class="btn btn-outline-light exit-btn">
    Salir / Volver al inicio
  </button>
</div>
      </header>

      <section class="summary-grid">
        <article class="summary-card">
          <p class="summary-label">Playa</p>
          <h3>Claromecó</h3>
        </article>

        <article class="summary-card">
          <p class="summary-label">Turno activo</p>
          <h3>Mañana</h3>
        </article>

        <article class="summary-card">
          <p class="summary-label">Registro</p>
          <h3>Intervenciones</h3>
        </article>
      </section>

      <main id="contenido" class="content-grid">
        <section class="glass-card form-card">
          <div class="section-head">
            <p class="section-eyebrow">Carga operativa</p>
            <h2>Registrar intervención</h2>
          </div>

          <form id="nueva-intervencion" class="formulario-operativo">
            <div class="field-grid">
              <div class="field">
                <label for="fecha">Fecha</label>
                <input
                  type="date"
                  id="fecha"
                  name="fecha"
                  class="form-control custom-input"
                />
              </div>

              <div class="field">
                <label for="hora">Hora</label>
                <input
                  type="time"
                  id="hora"
                  name="hora"
                  class="form-control custom-input"
                />
              </div>

              <div class="field">
                <label for="puesto">Puesto</label>
                <input
                  type="text"
                  id="puesto"
                  name="puesto"
                  class="form-control custom-input"
                  placeholder="Ej: Puesto 3"
                />
              </div>

              <div class="field">
                <label for="codigo">Código</label>
                <input
                  type="text"
                  id="codigo"
                  name="codigo"
                  class="form-control custom-input"
                  placeholder="Ej: Verde / Amarillo / Rojo"
                />
              </div>

              <div class="field field-full">
                <label for="mar">Estado del mar</label>
                <input
                  type="text"
                  id="mar"
                  name="mar"
                  class="form-control custom-input"
                  placeholder="Ej: Calmo, moderado, con rompiente"
                />
              </div>

              <div class="field field-full">
                <label for="viento">Dirección del viento</label>
                <input
                  type="text"
                  id="viento"
                  name="viento"
                  class="form-control custom-input"
                  placeholder="Ej: Norte, sur, offshore"
                />
              </div>
            </div>

            <div class="form-actions">
              <button type="submit" class="btn submit-btn w-100">
                Crear intervención
              </button>
            </div>
          </form>
        </section>

        <section class="glass-card list-card">
          <div class="section-head">
            <p class="section-eyebrow">Seguimiento</p>
            <h2>Intervenciones registradas</h2>
          </div>

          <div class="list-block">
            <h3 class="list-title">Base inicial</h3>
            <ul
              id="intervencionesEstaticas"
              class="list-group lista-intervenciones"
            ></ul>
          </div>

          <div class="list-block">
            <h3 class="list-title">Intervenciones nuevas</h3>
            <ul
              id="intervenciones"
              class="list-group lista-intervenciones"
            ></ul>
          </div>
        </section>
      </main>
    </div>
    <footer class="footer">
      Copyright 2027 - Desarrollado por Lucas Epherra
    </footer>
    <script src="//cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/static.js"></script>
    <script src="../js/mañana.js"></script>
  </body>
</html>
